<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 72px;
            margin: 0;
            color: #343a40;
        }
        p {
            font-size: 20px;
            margin-top: 10px;
            color: #6c757d;
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        .error-image {
            width: 200px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="404-page-not-found-illustration-2048x998-yjzeuy4v.png" alt="404 Not Found" class="error-image">

        <p>It looks like the page you're trying to reach doesn't exist.</p>
        <p><a href="https://<yourusername>.github.io/">Return to Home</a></p>
    </div>
</body>
</html>
