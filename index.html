<!DOCTYPE html>
<html>
<head>
    <title>Roblox Concept UI</title>
    <style>
        /* CSS styles for the loading screen */
        body {
            font-family: Arial, sans-serif;
            background-color: #181818; /* Dark background similar to Roblox */
            color: #ffffff; /* White text */
            margin: 0;
            padding: 0;
        }

        /* Sticky header styles */
        .sticky-header {
            position: fixed;
            top: -80px; /* Initially off the screen */
            left: 0;
            width: 100%;
            background-color: #181818; /* Dark background for the header */
            box-shadow: 0 5px 5px -5px #000; /* Shadow effect */
            z-index: 100; /* Ensure the header is on top of other content */
            padding: 10px 20px;
            transition: top 1s ease-in; /* Animation for sliding in from the top */
        }

        .navbar {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }

        .navbar-item {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }

        /* Content styles - initially hidden with opacity 0 and translated to the left */
        #content {
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateX(-100%);
            transition: opacity 1s ease-in, transform 1s ease-in;
            margin-top: 100px; /* To ensure content is below the sticky header */
        }

        /* Neumorphic UI styles for featured experiences and store sections */
        .neumorphic-container {
            background-color: #181818;
            box-shadow: -10px -10px 30px 0 #0f0f0f, 10px 10px 30px 0 #212121;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .section-content {
            display: flex;
            gap: 20px;
        }

        /* Add more styling as needed */
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="loading-logo">Roblox</div>
        <div class="loading-spinner"></div>
    </div>

    <!-- Sticky header - initially off the screen -->
    <div class="sticky-header" id="sticky-header">
        <ul class="navbar">
            <li class="navbar-item">Home</li>
            <li class="navbar-item">Games</li>
            <li class="navbar-item">Avatar</li>
            <li class="navbar-item">Shop</li>
            <li class="navbar-item">Community</li>
        </ul>
        <a class="logo" href="#">Roblox Logo</a>
    </div>

    <!-- Your content goes here, but initially, set it to display: none -->
    <div id="content">
        <div class="neumorphic-container">
            <div class="section-title">Featured Experiences</div>
            <div class="section-content">
                <!-- Add featured experiences content here -->
            </div>
        </div>

        <div class="neumorphic-container">
            <div class="section-title">Store</div>
            <div class="section-content">
                <!-- Add store content here -->
            </div>
        </div>

        <!-- Rest of your page content -->
    </div>

    <script>
        // JavaScript to hide the loading screen and animate the content when the page is fully loaded
        window.addEventListener('load', function () {
            var loadingContainer = document.querySelector('.loading-container');
            var content = document.getElementById('content');
            var stickyHeader = document.getElementById('sticky-header');

            // Hide the loading screen
            loadingContainer.style.display = 'none';

            // Animate the content by changing opacity and translating from the left
            content.style.opacity = '1';
            content.style.transform = 'translateX(0)';

            // Slide in the sticky header from the top
            setTimeout(function () {
                stickyHeader.style.top = '0';
            }, 500); // Adjust the delay as needed
        });
    </script>
</body>
</html>
