<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Concept UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #0099cc;
            color: white;
            text-align: center;
            position: sticky;
            top: 0;
        }

        nav {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
            margin: 0 20px;
        }

        nav a {
            text-decoration: none;
            color: white;
        }

        main {
            padding: 20px;
        }

        section {
            margin: 20px;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        .button-container {
            background-color: #333;
            text-align: center;
            padding: 10px;
            position: relative;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #0099cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Roblox Concept UI</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Games</a></li>
            <li><a href="#">Store</a></li>
            <li><a href="#">Community</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <h2>Featured Games</h2>
            <a href="https://www.roblox.com/games/10118559731/nicos-nextbots-BIRTHDAY" class="button" target="_blank">Nico's nextbots</a>
        </section>
        <section>
            <h2>Store</h2>
            <!-- Add featured items or categories from the store here -->
        </section>
    </main>
    <div class="button-container">
        <button class="button">Get Robux</button>
        <button class="button">Get Credits</button>
    </div>
    <footer>
        <p>Roblox Concept UI</p>
    </footer>
</body>
</html>
