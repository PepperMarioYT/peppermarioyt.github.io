<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Concept UI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #333;
            color: white;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #222;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
        }

        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin: 0 20px;
        }

        nav a {
            text-decoration: none;
            color: white;
        }

        .button-container {
            text-align: center;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #0099cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #222;
            min-width: 160px;
            z-index: 1;
        }

        .dropdown-toggle {
            cursor: pointer;
        }

        .dropdown-toggle::after {
            content: "▼"; /* Unicode down arrow character */
            margin-left: 5px;
        }

        .dropdown-content a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px 20px;
        }

        .dropdown-content a:hover {
            background-color: #0099cc;
        }

        .dropdown.is-open .dropdown-content {
            display: block;
        }

        main {
            padding: 20px;
        }

        section {
            margin: 20px;
            padding: 20px;
            background-color: #444;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* Media query for mobile devices */
        @media (max-width: 768px) {
            .dropdown-content {
                position: static;
                background-color: #222;
                display: none;
            }
            .dropdown.is-open .dropdown-content {
                display: block;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1 class="logo">Roblox</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Games</a></li>
                <li><a href="#">Store</a></li>
                <li><a href="#">Community</a></li>
                <li class="dropdown">
                    <div class="dropdown-toggle">Robux ▼</div>
                    <div class="dropdown-content">
                        <a href="#">Get Robux</a>
                        <a href="#">Get Credits</a>
                        <a class="close-dropdown" href="#">Close</a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Featured Games</h2>
            <a href="https://www.roblox.com/games/10118559731/nicos-nextbots-BIRTHDAY" class="button" target="_blank">Nico's nextbots</a>
        </section>
        <section>
            <h2>Store</h2>
            <!-- Add featured items or categories from the store here -->
        </section>
    </main>
    <footer>
        <p>Roblox Concept UI</p>
    </footer>
    <script>
        // JavaScript for mobile dropdown
        const dropdowns = document.querySelectorAll('.dropdown');
        dropdowns.forEach((dropdown) => {
            dropdown.addEventListener('click', () => {
                dropdown.classList.toggle('is-open');
            });
            const closeDropdown = dropdown.querySelector('.close-dropdown');
            if (closeDropdown) {
                closeDropdown.addEventListener('click', (e) => {
                    e.preventDefault();
                    dropdown.classList.remove('is-open');
                });
            }
        });
    </script>
</body>
</html>
